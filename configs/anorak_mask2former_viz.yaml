trainer:
  precision: "16-mixed" # or "bf16-mixed" for uni2 or 16-mixed for h-optimus
  max_steps: 40000
  val_check_interval: ~
  check_val_every_n_epoch: 1
  accumulate_grad_batches: 1
  logger: null
  callbacks:
  - class_path: pathseg.training.callbacks.save_seg_viz.SaveSegVizCallback
    init_args:
      out_dir: /home/valentin/workspaces/pathseg-benchmark/reports/figures/semantic_linear_896_h0-mini_fold-0
      num_classes: 7           # <-- set this
      dpi: 200
      write_csv: true
      save_pred_mask: false
      show_iou_per_class: true
      iou_present_only: true
model:
  class_path: pathseg.training.mask2former_semantic.Mask2formerSemantic
  init_args:
    freeze_encoder: False
    network:
      class_path: pathseg.models.mask2former_decoder.Mask2formerDecoder
      init_args:
        encoder_id: "h0-mini"
    tiler:
      class_path: pathseg.training.tiler.GridPadTiler
      init_args:
        tile: 896
        stride: 448
        weighted_blend: true # or true
        pad_mode: "replicate" # optional; nice for images
        pad_value: 0.0
data:
  class_path: pathseg.datasets.anorak.ANORAK
  init_args:
    root: /home/valentin/workspaces/pathseg-benchmark/data/fss/anorak
    target_format: mask2former
    num_classes: 7
    img_size: [896, 896]
    prefetch_factor: 4
    num_workers: 0
    batch_size: 16
    fold: 0
    epoch_repeat: 30
    transforms:
      class_path: pathseg.datasets.transforms.CustomTransforms
      init_args:
        img_size: [896, 896]
        scale_range: [0.8, 1.2]
        # disable_color_jitter: true
